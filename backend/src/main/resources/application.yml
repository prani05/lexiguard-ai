server:
  port: ${PORT:8081}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lexiguard}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:Prani05}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  gemini:
    api-key: ${GEMINI_API_KEY:}
  upload:
    dir: ${UPLOAD_DIR:uploads}
